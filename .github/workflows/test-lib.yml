name: Test soteria as library

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

# Cancel previous versions of this job that are still running.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-test-lib
  cancel-in-progress: true

jobs:
  test-soteria-as-lib:
    name: Test soteria as library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout soteria
        uses: actions/checkout@v4
        with:
          path: soteria

      # Written before setup-dune so that setup-dune can cache tmp/_build and
      # key the cache on tmp/dune-project (stable across commits).
      - name: Write minimal test project
        run: |
          SOTERIA_PATH="$GITHUB_WORKSPACE/soteria"

          mkdir -p tmp
          cat > tmp/dune-project << EOF
          (lang dune 3.14)
          (name soteria_test)

          (pin
           (package (name soteria))
           (url "file://$SOTERIA_PATH"))

          (package
           (name soteria_test)
           (allow_empty)
           (depends soteria))
          EOF

          cat > tmp/dune << 'EOF'
          (executable
           (name main)
           (libraries soteria))
          EOF

          cat > tmp/main.ml << 'EOF'
          let () = ()
          EOF

      - name: Setup dune
        uses: ocaml-dune/setup-dune@v2
        with:
          directory: tmp
          steps: all
