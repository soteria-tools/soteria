name: Test soteria as library

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

# Cancel previous versions of this job that are still running.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-test-lib
  cancel-in-progress: true

env:
  # [versionsync: OCAML_VERSION=5.5.0]
  OCAML_VERSION: 5.5.0

jobs:
  test-soteria-as-lib:
    name: Test soteria as library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout soteria
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #[actionpin: v6]
        with:
          path: soteria

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 #[actionpin: v3]
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
          dune-cache: false
          opam-pin: false

      - name: Restore opam cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #[actionpin: v5]
        with:
          path: _opam
          key: ${{ runner.os }}-${{ runner.arch }}-opam-testlib-${{ env.OCAML_VERSION }}-${{ hashFiles('soteria/*.opam') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-opam-testlib-${{ env.OCAML_VERSION }}-

      - name: Update opam
        run: opam update

      # Install soteria as an opam package, exactly as an external consumer would.
      - name: Install soteria
        run: opam install ./soteria/soteria.opam -y

      - name: Write minimal test project
        run: |
          mkdir -p tmp

          cat > tmp/dune-project << 'EOF'
          (lang dune 3.14)
          EOF

          cat > tmp/dune << 'EOF'
          (executable
           (name main)
           (libraries soteria))
          EOF

          cat > tmp/main.ml << 'EOF'
          module M = Soteria.Symex.Make
          EOF

      # Build a project that depends on the installed soteria library.
      - name: Build test project
        working-directory: tmp
        run: opam exec -- dune build

      - name: Opam Cleanup
        run: opam clean -a -r
