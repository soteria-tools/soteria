name: Benchmarks

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout for the benchmark script and config.
        required: false
        type: string
        default: ""
      artifact-run-id:
        description: >-
          Workflow run id to download the soteria-c/soteria-rust package
          artifacts from. When empty, artifacts of the current run are used.
        required: false
        type: string
        default: ""
      pr-number:
        description: >-
          When set, benchmark history is stored under a per-PR directory
          (dev/bench/pr-<n>) instead of the main history (dev/bench).
        required: false
        type: string
        default: ""

jobs:
  benchmarks:
    name: Run benchmarks
    # Runs on a self-hosted Linux runner so we benchmark on stable hardware;
    # the official Rust nightly image gives a fixed, reproducible toolchain
    # and OS environment on top of it.
    runs-on: [self-hosted, linux]
    container:
      image: rustlang/rust:nightly
    permissions:
      contents: write
    steps:
      - name: Install benchmark dependencies
        # The Rust nightly image is Debian-based and ships rustup + nightly,
        # curl, git, and gcc — but not the tools below.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends hyperfine cmake python3 jq

      - name: Trust git in this container
        # Self-hosted runner writes the workspace as the host user; the
        # container runs as root, so git's "dubious ownership" guard would
        # otherwise reject later operations (the workspace itself, the
        # Collections-C sub-checkout, and the gh-pages worktree used to seed
        # the PR dashboard). The container is ephemeral, so trusting any
        # path inside it is safe.
        run: git config --global --add safe.directory '*'

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #[actionpin: v6]
        with:
          ref: ${{ inputs.ref || github.ref }}

      # Benchmark target. Pinned to the same commit as test-packages.yml so
      # the benchmarked input is identical to the version tested there
      # (which contains a known bug → analysis exits non-zero, tolerated).
      - name: Checkout Collections-C (benchmark target)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #[actionpin: v6]
        with:
          repository: srdja/Collections-C
          ref: 67a094035b3f7159cf3f9af82c55ae63fcb86a34
          path: benchmark-projects/Collections-C

      # Conformance suites for the Rust conformance benchmark. Pinned to a
      # specific upstream commit so the metric is stable over time; bump these
      # by hand when tracking a newer toolchain.
      - name: Checkout Kani (conformance suite)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #[actionpin: v6]
        with:
          repository: model-checking/kani
          ref: 4c0fce8c300e1f049f2b0c6766a5111dfc9ff32e
          path: conformance/kani
      - name: Checkout Miri (conformance suite)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #[actionpin: v6]
        with:
          repository: rust-lang/miri
          ref: 28b3a0aad5cc0fc7d2fbaf480f50db823f7fe31d
          path: conformance/miri

      # The Obol-pinned rust-toolchain.toml drives rustup inside the container
      # so the .rs files / crates are compiled with the same toolchain CI uses.
      # The Obol repo/commit is read from the checked-out scripts/versions.json
      # (the single source of truth) rather than hard-coded here: this workflow
      # definition runs from the default branch, so a hard-coded value would
      # ignore a PR that bumps Obol and benchmark with a mismatched frontend.
      - name: Get Rust toolchain
        run: |
          OBOL_REPO=$(jq -r .OBOL_REPO scripts/versions.json)
          OBOL_COMMIT_HASH=$(jq -r .OBOL_COMMIT_HASH scripts/versions.json)
          curl https://raw.githubusercontent.com/$OBOL_REPO/$OBOL_COMMIT_HASH/rust-toolchain.toml > rust-toolchain

      # Packages produced by the Build workflow (.github/workflows/build.yml).
      # When artifact-run-id is set we pull them from that run (PR case),
      # otherwise from the current run (push-to-main case).
      - name: Download soteria-c package (current run)
        if: inputs.artifact-run-id == ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #[actionpin: v8]
        with:
          name: linux-x86_64-soteria-c-package
          path: soteria-c-package
      - name: Download soteria-rust package (current run)
        if: inputs.artifact-run-id == ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #[actionpin: v8]
        with:
          name: linux-x86_64-soteria-rust-package
          path: soteria-rust-package
      - name: Download soteria-c package (run ${{ inputs.artifact-run-id }})
        if: inputs.artifact-run-id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #[actionpin: v8]
        with:
          name: linux-x86_64-soteria-c-package
          path: soteria-c-package
          run-id: ${{ inputs.artifact-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download soteria-rust package (run ${{ inputs.artifact-run-id }})
        if: inputs.artifact-run-id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #[actionpin: v8]
        with:
          name: linux-x86_64-soteria-rust-package
          path: soteria-rust-package
          run-id: ${{ inputs.artifact-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add executable permissions
        run: chmod -R +x ./soteria-c-package/bin ./soteria-rust-package/bin

      - name: Setup environment variables
        run: |
          C_DIR="${GITHUB_WORKSPACE}/soteria-c-package"
          RUST_DIR="${GITHUB_WORKSPACE}/soteria-rust-package"
          echo "C_DIR=${C_DIR}" >> $GITHUB_ENV
          echo "RUST_DIR=${RUST_DIR}" >> $GITHUB_ENV
          # Binaries consumed by scripts/run_benchmarks.py
          echo "SOTERIA_C=${C_DIR}/bin/soteria-c" >> $GITHUB_ENV
          echo "SOTERIA_RUST=${RUST_DIR}/bin/soteria-rust" >> $GITHUB_ENV
          # soteria-c runtime configuration
          echo "CERB_INSTALL_PREFIX=${C_DIR}" >> $GITHUB_ENV
          echo "SOTERIA_AUTO_INCLUDE_PATH=${C_DIR}/lib/soteria-c" >> $GITHUB_ENV
          echo "SOTERIA_USE_CERB_HEADERS=true" >> $GITHUB_ENV
          # soteria-rust runtime configuration
          echo "SOTERIA_OBOL_PATH=${RUST_DIR}/bin/obol" >> $GITHUB_ENV
          echo "SOTERIA_CHARON_PATH=${RUST_DIR}/bin/charon" >> $GITHUB_ENV
          echo "SOTERIA_RUST_PLUGINS=${RUST_DIR}/plugins" >> $GITHUB_ENV
          # Each tool resolves z3 from its own package.
          echo "SOTERIA_Z3_PATH=${C_DIR}/bin/z3" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${C_DIR}/lib:${RUST_DIR}/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          # Conformance benchmark: soteria-rust/scripts/test.py invokes
          # `soteria-rust` and `obol` by name, and reads the suite locations
          # from these env vars.
          echo "${RUST_DIR}/bin" >> $GITHUB_PATH
          echo "KANI_SUITE_PATH=${GITHUB_WORKSPACE}/conformance/kani/tests/kani" >> $GITHUB_ENV
          echo "MIRI_SUITE_PATH=${GITHUB_WORKSPACE}/conformance/miri/tests" >> $GITHUB_ENV

      - name: Run benchmarks
        run: python3 scripts/run_benchmarks.py --output benchmark-results.json --conformance

      # Main pushes publish the new data point to gh-pages so the dashboard's
      # history advances. PR runs deliberately skip the publish — the
      # comparison-table flow below shows the PR author how this run compares
      # to main without touching the published history.
      - name: Store benchmark result
        if: inputs.pr-number == ''
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba #[actionpin: v1]
        with:
          name: Soteria benchmarks
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: true
          save-data-file: true
          comment-on-alert: true
          summary-always: true
          alert-threshold: "150%"
          fail-on-alert: false

      # github-action-benchmark only writes its default index.html when none
      # exists, so it never overwrites ours. Copy our custom dashboard over the
      # published one; this only produces a commit when the template changes.
      - name: Publish custom benchmark dashboard
        if: inputs.pr-number == ''
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          git worktree add --detach bench-dashboard origin/gh-pages
          cp scripts/bench-index.html bench-dashboard/dev/bench/index.html
          cd bench-dashboard
          if git diff --quiet -- dev/bench/index.html; then
            echo "Dashboard already up to date."
          else
            git add dev/bench/index.html
            git -c user.name='github-actions[bot]' \
                -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                commit -m 'Update benchmark dashboard'
            git push origin HEAD:gh-pages
          fi
          cd ..
          git worktree remove bench-dashboard

      # PR-only path: pull just main's data.js, build a comparison table, and
      # surface it via the step summary + an artifact that pr-commands.yml's
      # report job embeds in the PR status comment.
      - name: Fetch main benchmark history (PR only)
        if: inputs.pr-number != ''
        run: |
          set -euo pipefail
          mkdir -p main-bench
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch --depth=1 origin gh-pages
            # `git show` exits non-zero if the file doesn't exist on gh-pages
            # (first run, dir not yet created); tolerate that and leave the
            # file empty — the compare script then renders every row as new.
            git --no-pager show origin/gh-pages:dev/bench/data.js \
              > main-bench/data.js 2>/dev/null || true
          else
            echo "No gh-pages branch yet; comparing against an empty baseline."
          fi

      - name: Build comparison table (PR only)
        if: inputs.pr-number != ''
        run: |
          python3 scripts/compare_to_main.py \
            --current benchmark-results.json \
            --main-data main-bench/data.js \
            --output benchmark-comparison.md
          {
            echo "## Soteria benchmarks vs \`main\`"
            echo
            cat benchmark-comparison.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload comparison artifact (PR only)
        if: inputs.pr-number != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #[actionpin: v7]
        with:
          name: benchmark-comparison
          path: benchmark-comparison.md
          if-no-files-found: error
