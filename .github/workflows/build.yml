name: Build

on:
  workflow_call:

env:
  # [versionsync: OCAML_VERSION=5.4.1]
  OCAML_VERSION: 5.4.1
  # [versionsync: OBOL_REPO=soteria-tools/obol]
  OBOL_REPO: soteria-tools/obol
  # [versionsync: OBOL_COMMIT_HASH=42f11d00b19ba8bda50fd6fd43d860ef4dd4946d]
  OBOL_COMMIT_HASH: 42f11d00b19ba8bda50fd6fd43d860ef4dd4946d
  # [versionsync: CHARON_REPO=soteria-tools/charon]
  CHARON_REPO: soteria-tools/charon
  # [versionsync: CHARON_COMMIT_HASH=4986f2907dbe5899b0756ab623b5ef661ed2c58c]
  CHARON_COMMIT_HASH: 4986f2907dbe5899b0756ab623b5ef661ed2c58c

jobs:
  build:
    # If the job name or matrix values change, update the job name matched in
    # pr-commands.yml ("build / Build and Test (ubuntu-latest)").
    name: Build and Test
    strategy:
      matrix:
        operating-system: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.operating-system }}
    steps:
      # Setup steps: checkout, z3,  ocaml and opam
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #[actionpin: v6]
      - name: Check versions.json sync
        run: python3 scripts/versionsync.py check
      - name: Setup Z3
        uses: cda-tum/setup-z3@7bfe87519f27304460db44284cb8cc59f50f5fc9 #[actionpin: v1]
        id: z3
      - name: Setup OCaml
        uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 #[actionpin: v3]
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
          dune-cache: true
          opam-pin: false
      - name: Restore opam cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #[actionpin: v5]
        with:
          path: _opam
          key: ${{ runner.os }}-${{ runner.arch }}-opam-${{ env.OCAML_VERSION }}-${{ hashFiles('*.opam') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-opam-${{ env.OCAML_VERSION }}-
      - run: opam update
      # OCaml build
      - name: setup dependencies
        run: make ocaml-deps
      - name: Build OCaml stuff
        run: make ocaml
      - name: Check formatting
        run: make ocaml-format-check
      - name: Check mld formatting
        run: find . -name "*.mld" -not -path "./_opam/*" -not -path "./_build/*" -exec ocamlformat --doc --check {} \;

      # Install Rust
      - name: Get Rust toolchain
        run: curl https://raw.githubusercontent.com/$OBOL_REPO/$OBOL_COMMIT_HASH/rust-toolchain.toml > rust-toolchain
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #[actionpin: v1]
        with:
          target: x86_64-unknown-linux-gnu,aarch64-apple-darwin
      # Restore caches for Obol and Charon
      - name: Restore Obol cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #[actionpin: v5]
        id: restore-obol-cache
        with:
          path: obol-bin
          key: ${{ runner.os }}-${{ runner.arch }}-obol-${{ env.OBOL_COMMIT_HASH }}
      # Install Charon
      - name: Restore Charon cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #[actionpin: v5]
        id: restore-charon-cache
        with:
          path: charon-bin
          key: ${{ runner.os }}-${{ runner.arch }}-charon-${{ env.CHARON_COMMIT_HASH }}
      # On macOS, we need make
      - name: Install gmake (macOS)
        run: brew install make
        if: ${{ (!steps.restore-charon-cache.outputs.cache-hit || !steps.restore-obol-cache.outputs.cache-hit) && runner.os == 'macOS' }}
      - name: Install Obol if not cached
        run: |
          $GITHUB_WORKSPACE/scripts/versionsync.py pull obol --init
          cp -r ../obol/bin obol-bin
        if: ${{ !steps.restore-obol-cache.outputs.cache-hit }}
      - name: Add Obol to path
        run: echo "$PWD/obol-bin/" >> $GITHUB_PATH

      - name: Install Charon if not cached
        run: |
          $GITHUB_WORKSPACE/scripts/versionsync.py pull charon --init
          cp -r ../charon/bin charon-bin
        if: ${{ !steps.restore-charon-cache.outputs.cache-hit }}
      - name: Add Charon to path
        run: echo "$PWD/charon-bin/" >> $GITHUB_PATH

      # Run tests
      - name: Test
        run: make ocaml-test

      - name: Check if bv_values files were modified
        if: github.event_name == 'merge_group'
        id: check-bv-files
        run: |
          BASE_SHA="${{ github.event.merge_group.base_sha }}"
          HEAD_SHA="${{ github.event.merge_group.head_sha }}"
          echo "Comparing $BASE_SHA..$HEAD_SHA"

          # Use the GitHub API to compare commits (avoids needing full git history)
          CHANGED=$(gh api repos/${{ github.repository }}/compare/${BASE_SHA}...${HEAD_SHA} \
            --jq '.files[].filename' | grep -c "^soteria/lib/bv_values/" || true)

          if [ "$CHANGED" -gt 0 ]; then
            echo "modified=true" >> $GITHUB_OUTPUT
            echo "Files in soteria/lib/bv_values were modified, will run slow tests"
          else
            echo "modified=false" >> $GITHUB_OUTPUT
            echo "No files in soteria/lib/bv_values were modified, skipping slow tests"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run slow tests (fuzz tests)
        if: github.event_name == 'merge_group' && steps.check-bv-files.outputs.modified == 'true'
        run: make ocaml-slow-tests

      # Compute platform name for artifact naming (e.g. macos-arm64, linux-x86_64)
      - name: Set platform artifact name
        id: platform
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "name=macos-arm64" >> $GITHUB_OUTPUT
          else
            echo "name=linux-x86_64" >> $GITHUB_OUTPUT
          fi

      # Packaging OCaml distribution and sending it as artifact
      - name: Create soteria-c package
        run: make package-soteria-c
      - name: Upload soteria-c package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #[actionpin: v7]
        with:
          name: ${{ steps.platform.outputs.name }}-soteria-c-package
          path: packages/soteria-c
          if-no-files-found: error

      - name: Create soteria-rust package
        run: make package-soteria-rust
      - name: Upload soteria-rust package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #[actionpin: v7]
        with:
          name: ${{ steps.platform.outputs.name }}-soteria-rust-package
          path: packages/soteria-rust
          if-no-files-found: error

      - name: Build API documentation
        run: make doc

      - name: Upload documentation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #[actionpin: v7]
        with:
          name: odoc
          path: _build/default/_doc/_html
          if-no-files-found: error
        # Upload only once (same for both platforms).
        # We do this on linux because linux runners are cheaper.
        if: runner.os == 'linux'

      - name: Build JSON documentation
        run: make doc-json
        if: runner.os == 'linux'

      - name: Upload JSON documentation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #[actionpin: v7]
        with:
          name: odoc-json
          path: _build/default/_doc/_html
          if-no-files-found: error
        if: runner.os == 'linux'

      - name: Opam Cleanup
        run: opam clean -a -r
