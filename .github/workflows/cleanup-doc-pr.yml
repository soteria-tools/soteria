name: Cleanup PR Documentation

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup-pr-doc:
    name: Remove PR Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages

      - name: Check if PR documentation exists
        id: check
        run: |
          PR_DIR="api/pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Documentation folder found: $PR_DIR"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No documentation found for PR #${{ github.event.pull_request.number }}"
          fi

      - name: Remove PR documentation folder
        if: steps.check.outputs.found == 'true'
        run: |
          rm -rf "api/pr-${{ github.event.pull_request.number }}"

      - name: Commit and push
        if: steps.check.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove documentation for PR #${{ github.event.pull_request.number }}"
          git push

      - name: Post comment on PR
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.pull_request.number;
            const marker = '<!-- soteria:pr-doc-cleanup -->';
            const outdatedMarker = '<!-- soteria:outdated -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });

            const previousComments = comments.filter((comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(marker)
            );

            for (const comment of previousComments) {
              if (comment.body.includes(outdatedMarker)) {
                continue;
              }

              const cleanBody = comment.body.replace(marker, '').trim();
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: comment.id,
                body: `${marker}\n${outdatedMarker}\n⚠️ Outdated: superseded by a newer cleanup run.\n\n${cleanBody}`
              });

              try {
                await github.graphql(
                  'mutation($subjectId: ID!) { minimizeComment(input: { subjectId: $subjectId, classifier: OUTDATED }) { minimizedComment { isMinimized } } }',
                  { subjectId: comment.node_id }
                );
              } catch (error) {
                core.info(`Unable to minimize comment ${comment.id}: ${error.message}`);
              }
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: `${marker}\nDocumentation for this PR has been removed.`
            });
