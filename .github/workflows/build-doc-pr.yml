name: Build PR Documentation

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  publish-pr-doc:
    name: Publish PR Documentation
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '!build-doc') &&
      contains(fromJSON('["COLLABORATOR", "MEMBER", "OWNER"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Add eyes reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Get PR details
        id: pr
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid)
          SHA=$(echo "$PR_DATA" | jq -r .headRefOid)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find CI workflow run
        id: find-run
        run: |
          # Wait up to 5 minutes for a CI run to appear for this commit
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RUN_ID=$(gh run list --repo ${{ github.repository }} \
              --commit ${{ steps.pr.outputs.sha }} \
              --workflow ci.yml \
              --json databaseId,status \
              --jq '.[0].databaseId // empty')
            
            if [ -n "$RUN_ID" ]; then
              echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "Waiting for CI workflow to start... (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)"
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "No CI workflow run found for commit ${{ steps.pr.outputs.sha }}"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CI workflow to complete
        id: wait-ci
        run: |
          gh run watch ${{ steps.find-run.outputs.run_id }} --repo ${{ github.repository }} --exit-status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: odoc
          path: site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find-run.outputs.run_id }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: ./api/pr-${{ github.event.issue.number }}

      - name: Add rocket reaction on success
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Checkout default branch for local actions
        if: always()
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: source-repo

      - name: Post documentation status comment
        if: always()
        uses: ./source-repo/.github/actions/post-pr-status-comment
        with:
          issue-number: ${{ github.event.issue.number }}
          marker: soteria:pr-doc-status
          body: |
            ${{ job.status == 'success' && format('Documentation published at: https://{0}.github.io/{1}/api/pr-{2}. It should appear online in a few minutes.\n\nRun: https://github.com/{1}/actions/runs/{3}', github.repository_owner, github.repository, github.event.issue.number, github.run_id) || format('Failed to publish documentation. See [workflow run](https://github.com/{0}/actions/runs/{1}) for details.', github.repository, github.run_id) }}

      - name: Add failure reaction
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '-1'
            });
