name: Build PR Documentation

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  actions: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  publish-pr-doc:
    name: Publish PR Documentation
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '!build-doc') &&
      contains(fromJSON('["COLLABORATOR", "MEMBER", "OWNER"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Add eyes reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Get PR details
        id: pr
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid)
          SHA=$(echo "$PR_DATA" | jq -r .headRefOid)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find CI workflow run
        id: find-run
        run: |
          # Wait up to 5 minutes for a CI run to appear for this commit
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RUN_ID=$(gh run list --repo ${{ github.repository }} \
              --commit ${{ steps.pr.outputs.sha }} \
              --workflow ci.yml \
              --json databaseId,status \
              --jq '.[0].databaseId // empty')
            
            if [ -n "$RUN_ID" ]; then
              echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "Waiting for CI workflow to start... (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)"
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "No CI workflow run found for commit ${{ steps.pr.outputs.sha }}"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CI workflow to complete
        id: wait-ci
        run: |
          gh run watch ${{ steps.find-run.outputs.run_id }} --repo ${{ github.repository }} --exit-status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: odoc
          path: site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find-run.outputs.run_id }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: ./api/pr-${{ github.event.issue.number }}

      - name: Add rocket reaction on success
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Post documentation status comment
        if: always()
        uses: actions/github-script@v7
        env:
          RUN_STATUS: ${{ job.status }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.issue.number;
            const marker = '<!-- soteria:pr-doc-status -->';
            const outdatedMarker = '<!-- soteria:outdated -->';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const url = `https://${owner}.github.io/${repo}/api/pr-${prNumber}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });

            const previousComments = comments.filter((comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(marker)
            );

            for (const comment of previousComments) {
              if (comment.body.includes(outdatedMarker)) {
                continue;
              }

              const cleanBody = comment.body.replace(marker, '').trim();
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: comment.id,
                body: `${marker}\n${outdatedMarker}\n⚠️ Outdated: superseded by a newer documentation workflow run.\n\n${cleanBody}`
              });

              try {
                await github.graphql(
                  'mutation($subjectId: ID!) { minimizeComment(input: { subjectId: $subjectId, classifier: OUTDATED }) { minimizedComment { isMinimized } } }',
                  { subjectId: comment.node_id }
                );
              } catch (error) {
                core.info(`Unable to minimize comment ${comment.id}: ${error.message}`);
              }
            }

            const status = process.env.RUN_STATUS;
            const body = status === 'success'
              ? `${marker}\nDocumentation published at: ${url}. It should appear online in a few minutes.\n\nRun: ${runUrl}`
              : `${marker}\nFailed to publish documentation. See [workflow run](${runUrl}) for details.`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body
            });

      - name: Add failure reaction
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '-1'
            });
